name: shadowproof-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Compile Python
        run: python -m compileall -q shadowproof_core tests
      - name: Run unit and regression tests
        run: PYTHONPATH=. python -m pytest tests/ -q
      - name: Build wheel and smoke-test installed schemas outside source tree
        run: |
          python -m pip wheel --no-deps --no-build-isolation . -w dist
          python -m pip install --no-deps --target /tmp/shadowproof_wheel_smoke dist/shadowproof_bridge-0.25.7-*.whl
          cd /tmp
          PYTHONPATH=/tmp/shadowproof_wheel_smoke python - <<'PY'
from shadowproof_core.schema_validation import schema_for_tool
assert schema_for_tool('lean_check') is not None
assert schema_for_tool('shadowproof_model_provider_call') is not None
PY
      - name: Build MCP bridge
        run: cd mcp && npm ci && npm run build
      - name: Run buyer demo
        run: bash scripts/run_buyer_demo.sh
      - name: Run local simulation
        run: python -m shadowproof_core.cli local-sim examples/local_simulation/request.json
      - name: Check Dockerfile runtime artifact inclusion
        run: python - <<'PY'
from pathlib import Path
text = Path('deploy/api.Dockerfile').read_text()
for artifact in ['schemas', 'docs', 'examples', 'scripts', 'lean_project_template']:
    assert f'COPY {artifact} ./{artifact}' in text
PY
      - name: Docker build smoke test
        run: docker build -f deploy/api.Dockerfile -t shadowproof-api-ci .
      - name: Lightweight secret scan
        run: python scripts/ci_secret_scan.py
